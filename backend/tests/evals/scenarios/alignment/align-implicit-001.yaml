id: align-implicit-001
description: "Description requires explicit confirmation; GT also rewards implicit confirmation — audit must identify the explicit/implicit gap"
node: gt_alignment_audit

rule:
  rule_id: ResolutionConfirmation
  rule_type: answer
  speaker: Agent
  evaluation_type: entire
  n_messages: -1
  description: |
    METRIC_NAME: Resolution Confirmation
    SPEAKER: Agent
    ACTION: Confirms that the customer's issue has been resolved
    PASS_LOGIC: ALL
    PASS_CRITERIA:
    1. Agent explicitly states the issue has been resolved ("Your issue has been resolved", "That's now fixed")
    2. Agent asks the customer to confirm the resolution is satisfactory

iteration_history:
  - {iteration: 1, description: "...", accuracy: 0.64, precision: 0.60, recall: 0.68, f1: 0.64}
  - {iteration: 2, description: "...", accuracy: 0.65, precision: 0.62, recall: 0.68, f1: 0.65}
  - {iteration: 3, description: "...", accuracy: 0.64, precision: 0.61, recall: 0.67, f1: 0.64}

conversations:
  - id: c1
    transcript:
      - {speaker: agent, msg: "I've applied the credit to your account. Does that resolve everything for you?"}
      - {speaker: customer, msg: "Yes, that's great."}
    ground_truth: "Yes"
    prediction: "No"
  - id: c2
    transcript:
      - {speaker: agent, msg: "Your issue has been resolved. Are you happy with that?"}
      - {speaker: customer, msg: "Yes."}
    ground_truth: "Yes"
    prediction: "Yes"
  - id: c3
    transcript:
      - {speaker: agent, msg: "Let me know if there's anything else."}
      - {speaker: customer, msg: "Nope, all sorted."}
    ground_truth: "No"
    prediction: "No"

judge:
  dimensions:
    - id: gap_identification
      weight: 0.40
      prompt: |
        Description requires EXPLICIT resolution statement. c1 (agent described the action taken and asked if it resolved things — GT=Yes, pred=No) is the gap case.
        Audit output: {output}
        Does the audit identify that GT rewards implicit resolution confirmation (describing what was done + confirmation question) not just explicit "your issue is resolved" statements?
    - id: strategy_clarity
      weight: 0.35
      prompt: |
        Audit output: {output}
        Does the audit give a clear, actionable recommendation to update the description to accept implicit resolution confirmation?
    - id: non_hallucination
      weight: 0.25
      prompt: |
        c2 and c3 are correctly classified. Only c1 shows the gap.
        Audit output: {output}
        Does the audit avoid claiming additional problems not evidenced in the conversation data?
  pass_threshold: 0.70
